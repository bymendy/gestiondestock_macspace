# --- BASE DE DONN�ES RAILWAY ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- INTERCEPTEUR MULTI-TENANT ---
spring.jpa.properties.hibernate.session_factory.statement_inspector=com.macspace.gestiondestock.interceptor.MacSpaceInterceptor

# --- SERVEUR ---
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# --- JWT ---
application.security.jwt.secret-key=${JWT_SECRET:wzUpGa9k4LTV3QHuY8qVrt6wOENkvdes5vLHVc1ex6581IiQ}
application.security.jwt.expiration=36000000

# --- LOGGING ---
logging.level.root=WARN
logging.level.com.macspace=INFO
logging.level.org.springframework.security=WARN

# --- SPRINGDOC / SWAGGER ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

